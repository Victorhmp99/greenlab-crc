<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CRC — Green Lab</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>

<!-- ══ Lightbox de mídia ══ -->
<div id="lightbox" class="lightbox hidden" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-content"></div>
</div>

<!-- ══ Modal QR Code ══ -->
<div id="modal-qr" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>Conectar WhatsApp</span>
      <button onclick="closeQrModal()" class="modal-close">✕</button>
    </div>
    <div class="modal-body" style="align-items:center;gap:16px;">
      <p class="text-muted" style="text-align:center">
        Abra o WhatsApp → <strong>Dispositivos vinculados</strong> → <strong>Vincular dispositivo</strong>
      </p>
      <div id="qr-wrapper">
        <div class="qr-placeholder">
          <div class="spinner"></div>
          <span>Aguardando QR Code…</span>
        </div>
      </div>
      <p id="qr-session-label" class="text-muted" style="font-size:12px;text-align:center"></p>
    </div>
  </div>
</div>

<!-- ══ Modal adicionar sessão ══ -->
<div id="modal-add" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-header">
      <span>Adicionar número WhatsApp</span>
      <button onclick="closeAddModal()" class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <label class="field-label">Nome identificador</label>
      <input id="input-session-name" class="field-input" type="text"
        placeholder="Ex: Recepção, Vendas, Suporte…"
        onkeydown="if(event.key==='Enter') addSession()" />
      <div id="tenant-selector-wrap">
        <label class="field-label">Empresa</label>
        <select id="input-session-tenant" class="field-input" style="cursor:pointer"></select>
      </div>
      <button class="btn-primary" onclick="addSession()">Conectar</button>
    </div>
  </div>
</div>

<!-- ══ App ══ -->
<div id="app">

  <!-- Sessões (números) -->
  <aside id="sessions-panel">
    <div class="panel-header">
      <span class="panel-title">Números</span>
      <button class="btn-icon" title="Adicionar número" onclick="openAddModal()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="filter-all" class="session-item active" onclick="selectSession(null)">
      <div class="session-avatar all-avatar">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <div class="session-info">
        <span class="session-name">Todas</span>
        <span class="session-status-text">Caixa unificada</span>
      </div>
    </div>
    <div id="sessions-list"></div>
  </aside>

  <!-- Lista de conversas -->
  <section id="conversations-panel">
    <div class="panel-header">
      <span class="panel-title" id="conv-panel-title">Conversas</span>
    </div>
    <div class="search-box">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="text" placeholder="Buscar conversa…" oninput="onSearch(this.value)" />
    </div>
    <div id="conversations-list" class="list-scroll"></div>
  </section>

  <!-- Chat -->
  <main id="chat-panel">
    <div id="chat-empty" class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" opacity=".3"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Selecione uma conversa</span>
    </div>

    <div id="chat-content" class="hidden">
      <div id="chat-header">
        <div class="chat-avatar-wrap">
          <img id="chat-avatar-img" src="" class="chat-avatar-img hidden" />
          <div id="chat-avatar-initials" class="chat-avatar">?</div>
        </div>
        <div class="chat-header-info">
          <span id="chat-name">–</span>
          <span id="chat-meta">–</span>
          <span id="chat-presence"></span>
        </div>
        <a id="chat-wa-link" href="#" target="_blank" class="btn-wa-open" title="Abrir no WhatsApp Web">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
        </a>
      </div>

      <div id="messages-list" class="list-scroll"></div>

      <div id="chat-input-area">
        <!-- Anexo -->
        <input id="file-input" type="file" accept="image/*,video/*,audio/*,application/pdf,.doc,.docx,.xls,.xlsx" style="display:none" onchange="onFileSelected(this)" />
        <button class="btn-attach" title="Anexar arquivo" onclick="document.getElementById('file-input').click()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
        </button>
        <!-- Texto -->
        <textarea id="msg-input" placeholder="Digite uma mensagem…" rows="1"
          onkeydown="onMsgKeydown(event)" oninput="autoResize(this)"></textarea>
        <!-- Microfone / Enviar -->
        <button id="mic-btn" class="btn-mic" title="Segurar para gravar áudio"
          onmousedown="startRecording()" onmouseup="stopRecording()"
          ontouchstart="startRecording(event)" ontouchend="stopRecording()">
          <svg id="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <button id="send-btn" onclick="sendMessage()">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/app.js"></script>
</body>
</html>
